<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本留學手續清單｜鎌倉 × 川崎</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f5f3; --surface:#fff; --border:#e0e0e0;
    --text:#1a1a1a; --text2:#666; --text3:#999;
    --gold:#b8860b; --gold-soft:#f0e6cc;
  }
  body.dark {
    --bg:#111110; --surface:#1c1c1a; --border:#2e2e2b;
    --text:#f0ede8; --text2:#a8a69e; --text3:#777;
    --gold:#d4a94e; --gold-soft:#3a3320;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Noto Sans TC',-apple-system,'PingFang TC',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; padding:40px 20px 60px;
    transition:background .2s,color .2s;
    line-height:1.7;
  }
  .container { max-width:760px; margin:0 auto; }

  header { position:relative; margin-bottom:30px; }
  .toolbar { position:absolute; top:0; right:0; display:flex; gap:8px; }
  .tool-btn {
    width:34px; height:34px; border-radius:50%;
    border:1px solid var(--border); background:var(--surface);
    color:var(--text2); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:border-color .15s,color .15s;
  }
  .tool-btn:hover { border-color:var(--gold); color:var(--text); }
  .tool-btn:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  .tool-btn svg { display:block; }

  header h1 {
    font-weight:700; font-size:clamp(26px,5.5vw,38px);
    letter-spacing:.02em; padding-right:120px;
  }
  header p.sub { margin-top:8px; color:var(--text2); font-size:13px; }

  .progress-wrap { margin-top:22px; }
  .progress-label {
    display:flex; justify-content:space-between;
    font-size:12px; color:var(--text2); margin-bottom:7px; letter-spacing:.04em;
  }
  .progress-bar { height:3px; background:var(--border); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--gold); width:0%; transition:width .4s ease; }

  .phase { margin-top:34px; }
  .phase-head { display:flex; align-items:baseline; gap:10px; margin-bottom:4px; }
  .phase-num { font-size:11px; font-weight:600; color:var(--gold); letter-spacing:.1em; white-space:nowrap; }
  .phase-title { font-weight:700; font-size:19px; letter-spacing:.02em; }
  .phase-note { font-size:12.5px; color:var(--text2); margin-bottom:14px; }

  .grid { display:grid; grid-template-columns:1fr; gap:10px; }

  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; overflow:hidden;
    transition:border-color .15s,transform .15s;
  }
  .card:hover { border-color:var(--gold); }
  .card.done { opacity:.62; }
  .card.done .card-title { text-decoration:line-through; text-decoration-thickness:1px; color:var(--text2); }

  .card-head {
    display:flex; align-items:flex-start; gap:14px;
    padding:16px 20px; cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .check {
    flex:none; width:24px; height:24px; margin-top:1px;
    border:1.5px solid var(--text3); border-radius:50%;
    position:relative; transition:border-color .2s,background .2s;
  }
  .check:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  .card.done .check { border-color:var(--gold); background:var(--gold); }
  .check svg { position:absolute; inset:0; margin:auto; opacity:0; transform:scale(.5); transition:opacity .2s,transform .2s; }
  .card.done .check svg { opacity:1; transform:scale(1); }

  .card-main { flex:1; min-width:0; }
  .card-num { font-size:11px; font-weight:600; color:var(--gold); letter-spacing:.06em; display:block; margin-bottom:3px; }
  .card-title { font-weight:600; font-size:17px; letter-spacing:.01em; }
  .badges { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .badge {
    font-size:11px; padding:2px 9px; border-radius:20px;
    color:var(--text2); border:1px solid var(--border);
  }
  .badge.key { color:var(--gold); border-color:var(--gold); background:var(--gold-soft); }

  .toggle { flex:none; color:var(--text3); margin-top:4px; transition:transform .2s; }
  .card.open .toggle { transform:rotate(180deg); }

  .card-body { display:none; padding:0 20px 20px 58px; font-size:13.5px; }
  .card.open .card-body { display:block; }

  .sec-label { font-size:11px; font-weight:600; color:var(--gold); letter-spacing:.1em; margin:14px 0 6px; }
  .card-body ul { list-style:none; }
  .card-body li { padding-left:15px; position:relative; margin-bottom:4px; color:var(--text); }
  .card-body li::before { content:""; position:absolute; left:0; top:.72em; width:5px; height:5px; border-radius:50%; background:var(--gold); opacity:.5; }

  .tip {
    background:var(--gold-soft); border-radius:10px;
    padding:11px 14px; margin-top:13px; font-size:13px; line-height:1.65;
  }
  .links { margin-top:6px; display:flex; flex-direction:column; gap:7px; }
  .links a {
    color:var(--text); font-size:13px; text-decoration:none;
    display:flex; align-items:center; gap:8px;
    width:fit-content; max-width:100%;
  }
  .links a .name { border-bottom:1px solid var(--border); padding-bottom:1px; word-break:break-all; transition:border-color .15s; }
  .links a:hover .name { border-color:var(--gold); }
  .src-tag {
    flex:none; font-size:10px; letter-spacing:.06em;
    color:var(--text2); border:1px solid var(--border);
    border-radius:4px; padding:1px 6px;
  }
  .src-tag.gov { color:var(--gold); border-color:var(--gold); }

  /* 條列模式：收合為單行連結列表 */
  .grid.list-mode .card-head { padding:12px 18px; }
  .grid.list-mode .badges { display:none; }
  .grid.list-mode .card-num { display:inline; margin-bottom:0; margin-right:8px; }
  .grid.list-mode .card-title { display:inline; font-size:15px; }

  /* 註記區 */
  .notes { margin-top:16px; }
  .note-item {
    display:flex; align-items:flex-start; gap:8px;
    background:var(--bg); border:1px solid var(--border);
    border-radius:9px; padding:8px 10px; margin-bottom:6px;
    font-size:13px; word-break:break-word;
  }
  .note-item .note-text { flex:1; min-width:0; line-height:1.6; }
  .note-item .note-text a { color:var(--gold); text-decoration:none; border-bottom:1px solid var(--gold); word-break:break-all; }
  .note-del {
    flex:none; background:none; border:none; cursor:pointer;
    color:var(--text3); font-size:15px; line-height:1; padding:2px 4px;
    border-radius:4px; transition:color .15s;
  }
  .note-del:hover { color:#c0392b; }
  .note-add { display:flex; gap:8px; margin-top:8px; }
  .note-add textarea {
    flex:1; resize:vertical; min-height:38px; max-height:160px;
    font-family:inherit; font-size:13px; line-height:1.6;
    color:var(--text); background:var(--surface);
    border:1px solid var(--border); border-radius:9px; padding:8px 10px;
  }
  .note-add textarea:focus { outline:none; border-color:var(--gold); }
  .note-add-btn {
    flex:none; align-self:stretch; padding:0 16px;
    font-family:inherit; font-size:13px; font-weight:600;
    color:#fff; background:var(--gold); border:none;
    border-radius:9px; cursor:pointer; transition:opacity .15s;
  }
  .note-add-btn:hover { opacity:.88; }
  .note-empty { font-size:12.5px; color:var(--text3); font-style:normal; }

  /* 同步狀態列 */
  .sync-bar {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    margin-top:16px; padding:10px 14px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; font-size:12.5px; color:var(--text2);
  }
  .sync-dot { width:8px; height:8px; border-radius:50%; flex:none; background:var(--text3); transition:background .2s; }
  .sync-dot.on { background:#3a9d5d; }
  .sync-dot.off { background:#c0392b; }
  .sync-dot.wait { background:var(--gold); }
  .sync-text { flex:1; min-width:120px; }
  .sync-btn {
    flex:none; font-family:inherit; font-size:12px;
    color:var(--gold); background:none; border:1px solid var(--border);
    border-radius:16px; padding:4px 12px; cursor:pointer; transition:border-color .15s;
  }
  .sync-btn:hover { border-color:var(--gold); }

  /* 設定彈窗 */
  .modal-mask {
    position:fixed; inset:0; background:rgba(0,0,0,.5);
    display:none; align-items:center; justify-content:center;
    padding:20px; z-index:100;
  }
  .modal-mask.show { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:24px; max-width:420px; width:100%;
  }
  .modal h3 { font-size:17px; font-weight:700; margin-bottom:8px; }
  .modal p { font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:14px; }
  .modal input {
    width:100%; font-family:inherit; font-size:14px;
    color:var(--text); background:var(--bg);
    border:1px solid var(--border); border-radius:10px;
    padding:11px 13px; margin-bottom:6px;
  }
  .modal input:focus { outline:none; border-color:var(--gold); }
  .modal .hint { font-size:11.5px; color:var(--text3); margin-bottom:16px; }
  .modal-btns { display:flex; gap:10px; }
  .modal-btns button {
    flex:1; font-family:inherit; font-size:14px; font-weight:600;
    padding:11px; border-radius:10px; cursor:pointer; border:1px solid var(--border);
  }
  .btn-primary { color:#fff; background:var(--gold); border-color:var(--gold); }
  .btn-ghost { color:var(--text2); background:none; }

  footer { text-align:center; margin-top:40px; font-size:12px; color:var(--text3); line-height:1.8; }
  .reset-inline {
    background:none; border:none; color:var(--text3);
    font-family:inherit; font-size:12px; cursor:pointer;
    text-decoration:underline; text-underline-offset:3px;
  }
  .reset-inline:hover { color:var(--gold); }

  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="container">
  <header>
    <div class="toolbar">
      <button class="tool-btn" id="layout-btn" onclick="toggleLayout()" title="切換顯示模式" aria-label="切換顯示模式">
        <svg id="icon-list" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <svg id="icon-grid" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button class="tool-btn" id="theme-btn" onclick="toggleTheme()" title="切換深色模式" aria-label="切換深色模式">
        <svg id="icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
    <h1>日本留學手續清單</h1>
    <p class="sub">鎌倉市居住・川崎語言學校就讀 ── 台灣護照適用版</p>
    <div class="progress-wrap">
      <div class="progress-label"><span>完成進度</span><span id="progText">0 / 0</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    </div>
    <div class="sync-bar">
      <span class="sync-dot" id="syncDot"></span>
      <span class="sync-text" id="syncText">尚未連線雲端，資料僅存本機</span>
      <button class="sync-btn" id="syncBtn">設定雲端同步</button>
    </div>
  </header>

  <div id="app"></div>

  <footer>
    <p>資訊整理自各官方網站與參考來源，規費與規定可能變動，辦理前請以官方最新公告為準。</p>
    <p style="margin-top:8px">進度與顯示設定會儲存在本裝置　·　<button class="reset-inline" id="resetBtn">重設進度</button></p>
  </footer>
</div>

<div class="modal-mask" id="modalMask">
  <div class="modal">
    <h3>雲端同步設定</h3>
    <p>輸入一組只有你知道的「通關密語」，在任何裝置輸入同一句，就能同步你的勾選與註記。請設定 12 字以上、好記但別人猜不到的句子（例如一句只有你懂的話）。</p>
    <input type="text" id="passInput" placeholder="例如：鎌倉日文留學2026" autocomplete="off">
    <div class="hint" id="passHint">目前 0 字，還需要 12 字</div>
    <div class="modal-btns">
      <button class="btn-ghost" id="passCancel">取消</button>
      <button class="btn-primary" id="passSave">連線並同步</button>
    </div>
  </div>
</div>

<script>
// 連結格式：[名稱, 網址, 類型]  類型：官方 / 中文 / 參考
const DATA = [
{

const CHEV_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

const app = document.getElementById('app');

// ── 資料模型 ──────────────────────────────
// state.done : { itemId: true }
// state.notes: { itemId: [ {id, text, ts}, ... ] }
let state = { done:{}, notes:{} };
function isDone(id){ return !!state.done[id]; }
function getNotes(id){ return state.notes[id] || []; }

// ── Firebase 同步狀態 ─────────────────────
const FB_CONFIG = {
  apiKey: "AIzaSyDxaFt7Nfct1rtjGHrcs8yP-mRVAAwdZ-Q",
  authDomain: "japan-checklist-4c300.firebaseapp.com",
  projectId: "japan-checklist-4c300",
  storageBucket: "japan-checklist-4c300.firebasestorage.app",
  messagingSenderId: "753120723423",
  appId: "1:753120723423:web:e342af1cf988f02b10c46a"
};
let db=null, passphrase=null, unsub=null, applyingRemote=false, saveTimer=null;

function setSync(status, text){
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncText');
  dot.className='sync-dot'+(status?(' '+status):'');
  if(text) txt.textContent=text;
}

// ── 本機儲存（雲端未連線時的後備）──────────
function loadLocal(){
  try{
    const r=localStorage.getItem('jp-checklist-state');
    if(r){ state=JSON.parse(r); state.done=state.done||{}; state.notes=state.notes||{}; }
    else {
      // 相容舊版：把舊的 doneSet 陣列搬進來
      const old=localStorage.getItem('jp-checklist-v1');
      if(old){ JSON.parse(old).forEach(id=>state.done[id]=true); }
    }
  }catch(e){}
}
function saveLocal(){ try{ localStorage.setItem('jp-checklist-state', JSON.stringify(state)); }catch(e){} }

// ── 雲端寫入（去抖動，1 秒內多次變更只寫一次）──
function persist(){
  saveLocal();
  if(!db || !passphrase || applyingRemote) return;
  setSync('wait','儲存中…');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    db.collection('checklists').doc(passphrase).set(state)
      .then(()=>setSync('on','已同步到雲端'))
      .catch(err=>{ setSync('off','同步失敗：'+(err.code||err.message)); });
  }, 800);
}

// 對外統一用 persist() 取代舊的 saveProgress()
function saveProgress(){ persist(); }
function loadProgress(){ loadLocal(); }

function render(){
  app.innerHTML='';
  DATA.forEach(phase=>{
    const sec=document.createElement('section');
    sec.className='phase';
    sec.innerHTML=`<div class="phase-head"><span class="phase-num">${phase.phase}</span><span class="phase-title">${phase.title}</span></div><p class="phase-note">${phase.note}</p>`;
    const grid=document.createElement('div');
    grid.className='grid'+(layoutList?' list-mode':'');
    grid.setAttribute('data-grid','');
    phase.items.forEach(it=>{
      const el=document.createElement('article');
      el.className='card'+(isDone(it.id)?' done':'');
      el.dataset.id=it.id;
      const badges=it.badges.map(b=>`<span class="badge ${b.k?'key':''}">${b.t}</span>`).join('');
      const docs=it.docs.map(d=>`<li>${d}</li>`).join('');
      const steps=it.steps.map(s=>`<li>${s}</li>`).join('');
      const links=it.links.map(l=>`<a href="${l[1]}" target="_blank" rel="noopener"><span class="src-tag ${l[2]==='官方'?'gov':''}">${l[2]}</span><span class="name">${l[0]}</span></a>`).join('');
      el.innerHTML=`
        <div class="card-head">
          <div class="check" role="checkbox" aria-checked="${isDone(it.id)}" tabindex="0" aria-label="標記完成：${it.title}">${CHECK_SVG}</div>
          <div class="card-main">
            <span class="card-num">${it.num}</span>
            <span class="card-title">${it.title}</span>
            <div class="badges">${badges}</div>
          </div>
          <div class="toggle">${CHEV_SVG}</div>
        </div>
        <div class="card-body">
          <div class="sec-label">必要文件</div><ul>${docs}</ul>
          <div class="sec-label">辦理步驟</div><ul>${steps}</ul>
          ${it.tip?`<div class="tip">${it.tip}</div>`:''}
          ${links?`<div class="sec-label">情報來源</div><div class="links">${links}</div>`:''}
          <div class="sec-label">我的註記</div>
          <div class="notes" data-notes="${it.id}"></div>
          <div class="note-add">
            <textarea data-noteinput="${it.id}" rows="1" placeholder="貼上連結或輸入資料，例如預約網址、承辦電話、繳費金額…"></textarea>
            <button class="note-add-btn" data-noteadd="${it.id}">新增</button>
          </div>
        </div>`;
      grid.appendChild(el);
    });
    sec.appendChild(grid);
    app.appendChild(sec);
  });
  renderAllNotes();
  updateProgress();
}

// 把連結文字轉成可點的 <a>，其餘做 HTML 轉義
function escapeHtml(s){ return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function linkify(text){
  const esc=escapeHtml(text);
  return esc.replace(/(https?:\/\/[^\s]+)/g, u=>`<a href="${u}" target="_blank" rel="noopener">${u}</a>`).replace(/\n/g,'<br>');
}
function renderNotes(id){
  const box=document.querySelector(`[data-notes="${id}"]`);
  if(!box) return;
  const list=getNotes(id);
  if(!list.length){ box.innerHTML='<div class="note-empty">尚無註記</div>'; return; }
  box.innerHTML=list.map(n=>
    `<div class="note-item"><div class="note-text">${linkify(n.text)}</div><button class="note-del" data-notedel="${id}" data-nid="${n.id}" title="刪除">×</button></div>`
  ).join('');
}
function renderAllNotes(){ DATA.forEach(p=>p.items.forEach(it=>renderNotes(it.id))); }

function updateProgress(){
  const total=DATA.reduce((n,p)=>n+p.items.length,0);
  const done=Object.keys(state.done).filter(k=>state.done[k]).length;
  document.getElementById('progText').textContent=`${done} / ${total}`;
  document.getElementById('progFill').style.width=(total?done/total*100:0)+'%';
}

function addNote(id, text){
  text=text.trim(); if(!text) return;
  if(!state.notes[id]) state.notes[id]=[];
  state.notes[id].push({ id:'n'+Date.now()+Math.random().toString(36).slice(2,6), text, ts:Date.now() });
  renderNotes(id); persist();
}
function delNote(id, nid){
  if(!state.notes[id]) return;
  state.notes[id]=state.notes[id].filter(n=>n.id!==nid);
  if(!state.notes[id].length) delete state.notes[id];
  renderNotes(id); persist();
}

app.addEventListener('click',e=>{
  const cb=e.target.closest('.check');
  const del=e.target.closest('[data-notedel]');
  const addBtn=e.target.closest('[data-noteadd]');
  const head=e.target.closest('.card-head');
  if(cb){
    const card=cb.closest('.card'); const id=card.dataset.id;
    if(isDone(id)) delete state.done[id]; else state.done[id]=true;
    card.classList.toggle('done');
    cb.setAttribute('aria-checked',isDone(id));
    saveProgress(); updateProgress();
  }else if(del){
    delNote(del.dataset.notedel, del.dataset.nid);
  }else if(addBtn){
    const id=addBtn.dataset.noteadd;
    const ta=document.querySelector(`[data-noteinput="${id}"]`);
    addNote(id, ta.value); ta.value='';
  }else if(head){
    head.closest('.card').classList.toggle('open');
  }
});
app.addEventListener('keydown',e=>{
  if((e.key===' '||e.key==='Enter')&&e.target.classList.contains('check')){ e.preventDefault(); e.target.click(); }
  // 註記輸入框：Ctrl/Cmd + Enter 送出
  if(e.target.matches('[data-noteinput]') && (e.ctrlKey||e.metaKey) && e.key==='Enter'){
    const id=e.target.getAttribute('data-noteinput');
    addNote(id, e.target.value); e.target.value='';
  }
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  if(confirm('確定要清除所有勾選與註記嗎？此動作會同步到雲端，無法復原。')){
    state={ done:{}, notes:{} };
    saveProgress(); render();
  }
});

// 主題
function toggleTheme(){
  const dark=document.body.classList.toggle('dark');
  document.getElementById('icon-moon').style.display=dark?'none':'';
  document.getElementById('icon-sun').style.display=dark?'':'none';
  try{ localStorage.setItem('jp-checklist-dark',dark?'1':'0'); }catch(e){}
}
// 版面
let layoutList=false;
function toggleLayout(){
  layoutList=!layoutList;
  document.querySelectorAll('[data-grid]').forEach(g=>g.classList.toggle('list-mode',layoutList));
  document.getElementById('icon-list').style.display=layoutList?'':'none';
  document.getElementById('icon-grid').style.display=layoutList?'none':'';
  try{ localStorage.setItem('jp-checklist-layout',layoutList?'list':'grid'); }catch(e){}
}

// ── Firebase 連線 ─────────────────────────
function connectCloud(pass){
  if(typeof firebase==='undefined'){ setSync('off','無法載入 Firebase（請檢查網路）'); return; }
  try{
    if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    db=firebase.firestore();
  }catch(e){ setSync('off','Firebase 初始化失敗'); return; }
  passphrase=pass;
  try{ localStorage.setItem('jp-checklist-pass', pass); }catch(e){}
  setSync('wait','連線中…');
  if(unsub) unsub();
  // 即時監聽：任何裝置更新都會即時反映
  unsub=db.collection('checklists').doc(pass).onSnapshot(doc=>{
    if(doc.exists){
      applyingRemote=true;
      const d=doc.data();
      state={ done:d.done||{}, notes:d.notes||{} };
      saveLocal();
      render();
      applyingRemote=false;
      setSync('on','已同步到雲端');
    }else{
      // 雲端還沒有資料 → 把本機現有資料推上去當初始
      setSync('on','已連線，首次建立雲端資料');
      persist();
    }
  }, err=>{
    setSync('off','連線失敗：'+(err.code||err.message));
  });
}

// ── 彈窗控制 ──────────────────────────────
const mask=document.getElementById('modalMask');
const passInput=document.getElementById('passInput');
const passHint=document.getElementById('passHint');
function openModal(){ passInput.value=passphrase||''; updateHint(); mask.classList.add('show'); passInput.focus(); }
function closeModal(){ mask.classList.remove('show'); }
function updateHint(){
  const n=passInput.value.trim().length;
  passHint.textContent = n>=12 ? `目前 ${n} 字，可以連線` : `目前 ${n} 字，還需要 ${12-n} 字`;
  passHint.style.color = n>=12 ? 'var(--gold)' : '';
}
passInput.addEventListener('input', updateHint);
document.getElementById('syncBtn').addEventListener('click', openModal);
document.getElementById('passCancel').addEventListener('click', closeModal);
mask.addEventListener('click', e=>{ if(e.target===mask) closeModal(); });
document.getElementById('passSave').addEventListener('click', ()=>{
  const p=passInput.value.trim();
  if(p.length<12){ updateHint(); passInput.focus(); return; }
  closeModal();
  connectCloud(p);
});

function init(){
  let dark=null;
  try{ dark=localStorage.getItem('jp-checklist-dark'); }catch(e){}
  if(dark===null){ dark=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'1':'0'; }
  if(dark==='1'){ document.body.classList.add('dark'); document.getElementById('icon-moon').style.display='none'; document.getElementById('icon-sun').style.display=''; }
  try{ if(localStorage.getItem('jp-checklist-layout')==='list'){ layoutList=true; document.getElementById('icon-list').style.display=''; document.getElementById('icon-grid').style.display='none'; } }catch(e){}
  loadProgress();
  render();
  // 若這台裝置先前設過通關密語，自動重連
  let savedPass=null;
  try{ savedPass=localStorage.getItem('jp-checklist-pass'); }catch(e){}
  if(savedPass){ connectCloud(savedPass); }
  else{ setSync('','尚未連線雲端，資料僅存本機'); }
}
init();
</script>
